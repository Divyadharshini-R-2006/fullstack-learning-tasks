<!-- Create an <h1> element with text "My To-Do List" and append it to the <body>. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const head=document.createElement("h1");
        head.textContent="My To-Do List";
        document.body.appendChild(head);
    </script>
</body>    
</html>

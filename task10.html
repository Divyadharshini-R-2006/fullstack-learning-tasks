<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <p class="para"></p>
    <p class="para"></p>
    <p class="para"></p>

        const para=document.getElementsByClassName("para");

            para[i].style.color="red";
        }
